name: PR Review Agent

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-review-agent:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    env:
      AI_MODEL: ${{ vars.AI_MODEL || 'gpt-5.3-codex' }}
    steps:
      - name: Build PR diff context
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api "/repos/$REPO/pulls/$PR_NUMBER/files?per_page=100" --paginate > files.json

          jq -r '
            .[] |
            "FILE: \(.filename)\nSTATUS: \(.status)\nPATCH:\n\(.patch // "[binary/too-large patch omitted]")\n---"
          ' files.json > pr_diff.txt

          # Keep payload bounded for API reliability.
          head -c 120000 pr_diff.txt > pr_diff_trimmed.txt

          if [ ! -s pr_diff_trimmed.txt ]; then
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ask AI model to review PR diff
        id: ai_review
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            {
              echo "review_markdown<<EOF"
              echo "## PR Agent Review"
              echo ""
              echo "Skipped: \`OPENAI_API_KEY\` is not configured in repository secrets."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PROMPT_FILE=prompt.txt
          {
            echo "You are reviewing pull request #$PR_NUMBER in $REPO."
            echo "Focus on actionable code review findings only."
            echo "Prioritize:"
            echo "1) Correctness/logic bugs"
            echo "2) Security risks"
            echo "3) Regressions and edge cases"
            echo "4) Missing tests for risky changes"
            echo ""
            echo "Output markdown with sections:"
            echo "- ## PR Agent Review"
            echo "- ### Blocking issues"
            echo "- ### Non-blocking suggestions"
            echo "- ### Recommended tests"
            echo ""
            echo "If no issues are found, explicitly say so."
            echo ""
            echo "PR file diff:"
            cat pr_diff_trimmed.txt
          } > "$PROMPT_FILE"

          jq -n \
            --rawfile prompt "$PROMPT_FILE" \
            --arg model "$AI_MODEL" \
            '{
              model: $model,
              input: [
                {
                  role: "user",
                  content: [
                    { type: "input_text", text: $prompt }
                  ]
                }
              ]
            }' > payload.json

          curl -sS https://api.openai.com/v1/responses \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @payload.json > response.json

          # Surface API errors directly when available.
          API_ERROR=$(jq -r '.error.message // empty' response.json)
          if [ -n "$API_ERROR" ] && [ "$API_ERROR" != "null" ]; then
            REVIEW_TEXT="## PR Agent Review\n\nOpenAI API error: $API_ERROR"
          else
            # Handle multiple valid Responses API shapes.
            REVIEW_TEXT=$(jq -r '
              .output_text // empty,
              (
                .output[]?
                | select(.type == "message")
                | .content[]?
                | select((.type == "output_text") or (.type == "text"))
                | .text
              ),
              (
                .output[]?
                | select(.type == "output_text")
                | .text
              )
            ' response.json | awk 'NF { print; found=1 } END { if (!found) print "" }')
          fi

          if [ -z "$REVIEW_TEXT" ] || [ "$REVIEW_TEXT" = "null" ]; then
            REVIEW_TEXT="## PR Agent Review\n\nModel returned no review text. Check workflow logs for response.json payload."
          fi

          {
            echo "review_markdown<<EOF"
            echo -e "$REVIEW_TEXT"
            echo ""
            echo "_Generated by model \`$AI_MODEL\` on PR updates via OpenAI Responses API._"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment when no diff is available
        id: no-diff
        if: ${{ steps.diff.outputs.has_diff != 'true' }}
        run: |
          {
            echo "review_markdown<<EOF"
            echo "## PR Agent Review"
            echo ""
            echo "No textual diff available to review."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: codex-review
          message: ${{ steps.ai_review.outputs.review_markdown || steps.no-diff.outputs.review_markdown }}
