<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="version-info" content='%VITE_VERSION_INFO%' />
    <meta
      name="description"
      content="A turnkey solution for building and executing the workflows that drive your business"
    />
    <link rel="apple-touch-icon" href="/favicon.ico?v=2" />
    <link rel="manifest" href="/manifest.json?v=2" />
    <title>M8Flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
      :root {
        --loader-bg: #ffffff;
        --loader-fg: #111827;
        --loader-muted: rgba(17, 24, 39, 0.6);
        --loader-accent: #2563eb;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --loader-bg: #0b0f1a;
          --loader-fg: #e5e7eb;
          --loader-muted: rgba(229, 231, 235, 0.65);
          --loader-accent: #60a5fa;
        }
      }

      #initial-loader {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--loader-bg);
        color: var(--loader-fg);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        letter-spacing: 0.2px;
      }

      #initial-loader .wrap {
        display: grid;
        gap: 10px;
        justify-items: center;
      }

      #initial-loader .brand {
        font-size: 18px;
        font-weight: 600;
      }

      #initial-loader .sub {
        font-size: 13px;
        color: var(--loader-muted);
      }

      #initial-loader .spinner {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        border: 3px solid rgba(37, 99, 235, 0.25);
        border-top-color: var(--loader-accent);
        animation: initialLoaderSpin 900ms linear infinite;
      }

      @keyframes initialLoaderSpin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      window.spiffworkflowFrontendJsenv = {};
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="initial-loader" aria-label="Loading">
        <div class="wrap">
          <div class="spinner" role="progressbar" aria-valuetext="Loading"></div>
          <div class="brand">M8Flow</div>
          <div class="sub">Loading…</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
